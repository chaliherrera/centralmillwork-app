# ─────────────────────────────────────────────────────────────────────────────
# Docker Compose para tests — Audit roadmap "ahora #3"
# ─────────────────────────────────────────────────────────────────────────────
# Levanta un Postgres efímero en puerto 5433 (no choca con dev local en 5432)
# para que `npm test` corra contra una DB aislada.
#
# Uso:
#   docker compose -f docker-compose.test.yml up -d postgres-test
#   cd backend && npm test
#   docker compose -f docker-compose.test.yml down       # cuando termines
#
# La data NO persiste — `tmpfs` para velocidad. Cada `up -d` parte de cero.
# ─────────────────────────────────────────────────────────────────────────────

services:
  postgres-test:
    image: postgres:18-alpine
    container_name: cm-postgres-test
    ports:
      - '5433:5432'
    environment:
      POSTGRES_USER: test
      POSTGRES_PASSWORD: test
      POSTGRES_DB: cm_test
    tmpfs:
      - /var/lib/postgresql/data
    command:
      - postgres
      - -c
      - fsync=off
      - -c
      - synchronous_commit=off
      - -c
      - full_page_writes=off
      - -c
      - max_connections=50
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U test -d cm_test']
      interval: 2s
      timeout: 3s
      retries: 10
